# =============================================================================
# CARLA CONNECTION
# =============================================================================

carla:
  host: "localhost"
  port: 2000
  timeout: 10.0

# =============================================================================
# SIMULATION
# =============================================================================

simulation:
  synchronous_mode: true
  fixed_delta_seconds: 0.05
  fps: 20

# =============================================================================
# MAP
# =============================================================================

map:
  town: "Town04"

# =============================================================================
# EGO VEHICLE
# =============================================================================

ego:
  blueprint: "vehicle.tesla.model3"

  spawn:
    random: true
    spawn_index: 0

# =============================================================================
# TRAFFIC
# =============================================================================

traffic:

  tm_port: 8000

  seed: 42

  num_vehicles: 30

  hybrid_physics: true

  global_speed_difference: 0.0

  auto_lane_change: true

# =============================================================================
# SENSORS
# =============================================================================

camera:

  width: 800

  height: 600

  fov: 90

  x: 1.5

  y: 0.0

  z: 2.4

collision_sensor:
  enabled: true

lane_invasion_sensor:
  enabled: true

# =============================================================================
# ENVIRONMENT
# =============================================================================

environment:

  max_episode_steps: 1000

# =============================================================================
# RANDOMNESS
# =============================================================================

seed:

  python: 42

  numpy: 42

# =============================================================================
# LOGGING
# =============================================================================

logging:

  level: "INFO"

  save_directory: "logs"

# =============================================================================
# DEBUG
# =============================================================================

debug:

  spectator_follow: true

  draw_waypoints: false

  draw_spawn_points: false

  verbose: true